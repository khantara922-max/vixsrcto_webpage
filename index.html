<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VixSrc Extractor</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
  input, select, button { padding: 8px; margin: 4px; background: #222; color: #eee; border: 1px solid #444; }
  button { cursor: pointer; background: #333; }
  button:hover { background: #555; }
  #results { margin-top: 1rem; }
  .stream { margin: 6px 0; }
  .stream a { color: #4af; }
  #status { color: #fa4; margin-top: 8px; }
</style>
</head>
<body>
<h2>VixSrc Extractor</h2>
<input id="tmdb" placeholder="TMDB ID e.g. 786892" style="width:200px">
<select id="type">
  <option value="movie">Movie</option>
  <option value="tv">TV</option>
</select>
<button onclick="extract()">Extract</button>
<div id="status"></div>
<div id="results"></div>

<script>
const BASE = "https://vixsrc.to";
const PROXY = "https://corsproxy.io/?url=";

function p(url) { return PROXY + encodeURIComponent(url); }

function tryDecode(raw) {
  raw = raw.trim();
  // try plain JSON
  try { return JSON.parse(raw); } catch {}
  // try base64
  try {
    const pad = raw + "=".repeat((4 - raw.length % 4) % 4);
    return JSON.parse(atob(pad.replace(/-/g,'+').replace(/_/g,'/')));
  } catch {}
  throw new Error("Could not decode API response: " + raw.slice(0, 100));
}

async function extract() {
  const tmdb = document.getElementById("tmdb").value.trim();
  const type = document.getElementById("type").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  results.innerHTML = "";

  if (!tmdb) { status.textContent = "Enter a TMDB ID."; return; }

  try {
    // Step 1: warm up
    status.textContent = "Warming up session...";
    await fetch(p(`${BASE}/${type}/${tmdb}`));

    // Step 2: internal API
    status.textContent = "Calling API...";
    const r = await fetch(p(`${BASE}/api/${type}/${tmdb}`), {
      headers: { "Accept": "application/json, text/plain, */*" }
    });
    const raw = await r.text();
    console.log("API raw:", raw.slice(0, 200));

    const data = tryDecode(raw);
    console.log("API data:", data);

    if (!data.src) throw new Error("API returned no src field. Response: " + JSON.stringify(data));

    const src = data.src;
    const embed = src.startsWith("/") ? BASE + src : src;
    console.log("Embed URL:", embed);

    // Step 3: embed page
    status.textContent = "Loading embed page...";
    const r2 = await fetch(p(embed));
    const html = await r2.text();
    console.log("Embed HTML snippet:", html.slice(0, 500));

    const url   = html.match(/url\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const token = html.match(/['"]token['"]\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const exp   = html.match(/['"]expires['"]\s*:\s*['"]([^'"]*)['"]/)?.[1];

    console.log("Parsed:", { url, token, exp });
    if (!url || !token) throw new Error("Could not parse masterPlaylist from embed page");

    const master = `${url}?token=${token}&expires=${exp}&h=1&lang=en`;

    // Step 4: fetch M3U8
    status.textContent = "Fetching M3U8...";
    const r3 = await fetch(p(master));
    const m3u8 = await r3.text();
    console.log("M3U8:", m3u8.slice(0, 300));

    if (!m3u8.includes("#EXTM3U")) throw new Error("Invalid M3U8 response");

    const lines = m3u8.split("\n");
    let out = `<p><b>Master M3U8:</b> <a href="${master}" target="_blank">${master}</a></p>`;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXT-X-STREAM-INF")) {
        const res = lines[i].match(/RESOLUTION=(\d+x\d+)/)?.[1] ?? "unknown";
        const uri = lines[i+1]?.trim();
        if (uri) out += `<div class="stream"><b>${res}</b> — <a href="${uri}" target="_blank">${uri}</a></div>`;
      }
    }
    results.innerHTML = out;
    status.textContent = "Done.";

  } catch(e) {
    status.textContent = "Error: " + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
