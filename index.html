<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VixSrc Extractor</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
  input, select, button { padding: 8px; margin: 4px; background: #222; color: #eee; border: 1px solid #444; }
  button { cursor: pointer; background: #333; }
  button:hover { background: #555; }
  #results { margin-top: 1rem; }
  .stream { margin: 6px 0; }
  .stream a { color: #4af; }
  #status { color: #fa4; margin-top: 8px; }
</style>
</head>
<body>
<h2>VixSrc Extractor</h2>
<input id="tmdb" placeholder="TMDB ID e.g. 786892" style="width:200px">
<select id="type">
  <option value="movie">Movie</option>
  <option value="tv">TV</option>
</select>
<button onclick="extract()">Extract</button>
<div id="status"></div>
<div id="results"></div>

<script>
const BASE = "https://vixsrc.to";

const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${url}`,
  url => `https://cors.sh/?${url}`,
];

async function fetchWithProxy(url, attempt = 0) {
  if (attempt >= PROXIES.length) throw new Error("All proxies failed for: " + url);
  const proxy = PROXIES[attempt];
  try {
    const r = await fetch(proxy(url));
    const text = await r.text();
    // detect proxy error responses
    if (
      text.includes("has been blocked") ||
      text.includes("Access denied") ||
      text.includes("error") && text.length < 200
    ) {
      console.warn(`Proxy ${attempt} failed, trying next...`);
      return fetchWithProxy(url, attempt + 1);
    }
    return text;
  } catch {
    console.warn(`Proxy ${attempt} error, trying next...`);
    return fetchWithProxy(url, attempt + 1);
  }
}

function tryDecode(raw) {
  raw = raw.trim();
  try { return JSON.parse(raw); } catch {}
  try {
    const pad = raw + "=".repeat((4 - raw.length % 4) % 4);
    return JSON.parse(atob(pad.replace(/-/g,'+').replace(/_/g,'/')));
  } catch {}
  throw new Error("Could not decode API response: " + raw.slice(0, 150));
}

async function extract() {
  const tmdb = document.getElementById("tmdb").value.trim();
  const type = document.getElementById("type").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  results.innerHTML = "";

  if (!tmdb) { status.textContent = "Enter a TMDB ID."; return; }

  try {
    status.textContent = "Warming up...";
    await fetchWithProxy(`${BASE}/${type}/${tmdb}`);

    status.textContent = "Calling API...";
    const raw = await fetchWithProxy(`${BASE}/api/${type}/${tmdb}`);
    console.log("API raw:", raw.slice(0, 200));

    const data = tryDecode(raw);
    console.log("API data:", data);

    if (!data.src) throw new Error("No src in API response: " + JSON.stringify(data));

    const src = data.src;
    const embed = src.startsWith("/") ? BASE + src : src;
    console.log("Embed:", embed);

    status.textContent = "Loading embed...";
    const html = await fetchWithProxy(embed);
    console.log("Embed snippet:", html.slice(0, 400));

    const url   = html.match(/url\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const token = html.match(/['"]token['"]\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const exp   = html.match(/['"]expires['"]\s*:\s*['"]([^'"]*)['"]/)?.[1];

    console.log({url, token, exp});
    if (!url || !token) throw new Error("Could not parse masterPlaylist");

    const master = `${url}?token=${token}&expires=${exp}&h=1&lang=en`;

    status.textContent = "Fetching M3U8...";
    const m3u8 = await fetchWithProxy(master);
    console.log("M3U8:", m3u8.slice(0, 300));

    if (!m3u8.includes("#EXTM3U")) throw new Error("Invalid M3U8");

    const lines = m3u8.split("\n");
    let out = `<p><b>Master:</b> <a href="${master}" target="_blank">${master}</a></p>`;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXT-X-STREAM-INF")) {
        const res = lines[i].match(/RESOLUTION=(\d+x\d+)/)?.[1] ?? "unknown";
        const uri = lines[i+1]?.trim();
        if (uri) out += `<div class="stream"><b>${res}</b> — <a href="${uri}" target="_blank">${uri}</a></div>`;
      }
    }
    results.innerHTML = out;
    status.textContent = "Done.";

  } catch(e) {
    status.textContent = "Error: " + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
