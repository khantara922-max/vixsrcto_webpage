<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VixSrc Extractor</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
  input, select, button { padding: 8px; margin: 4px; background: #222; color: #eee; border: 1px solid #444; }
  button { cursor: pointer; background: #333; }
  button:hover { background: #555; }
  #results { margin-top: 1rem; }
  .stream { margin: 6px 0; }
  .stream a { color: #4af; }
  #status { color: #fa4; margin-top: 8px; }
  #proxy-log { margin-top: 1rem; font-size: 0.85rem; }
  .proxy-try  { color: #aaa; }
  .proxy-ok   { color: #4f4; }
  .proxy-fail { color: #f44; }
</style>
</head>
<body>
<h2>VixSrc Extractor</h2>
<input id="tmdb" placeholder="TMDB ID e.g. 786892" style="width:200px">
<select id="type">
  <option value="movie">Movie</option>
  <option value="tv">TV</option>
</select>
<button onclick="extract()">Extract</button>
<div id="status"></div>
<div id="proxy-log"></div>
<div id="results"></div>

<script>
const BASE = "https://vixsrc.to";

const PROXIES = [
  { name: "vixsrcproxy (workers.dev)", fn: url => `https://vixsrcproxy2.khantara922.workers.dev/?url=${encodeURIComponent(url)}` },
  { name: "corsproxy.io",              fn: url => `https://corsproxy.io/?url=${encodeURIComponent(url)}` },
  { name: "allorigins.win",            fn: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
  { name: "thingproxy.freeboard.io",   fn: url => `https://thingproxy.freeboard.io/fetch/${url}` },
  { name: "codetabs.com",             fn: url => `https://api.codetabs.com/v1/proxy?quest=${url}` },
  { name: "cors.sh",                  fn: url => `https://cors.sh/?${url}` },
];

// Track which proxy succeeded last time so we start from it next call
let lastWorkingProxy = 0;

function logProxy(index, state, extra = "") {
  const log = document.getElementById("proxy-log");
  const id = `proxy-line-${index}`;
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement("div");
    el.id = id;
    log.appendChild(el);
  }
  const icon = state === "try" ? "⏳" : state === "ok" ? "✅" : "❌";
  const cls  = state === "try" ? "proxy-try" : state === "ok" ? "proxy-ok" : "proxy-fail";
  el.className = cls;
  el.textContent = `${icon} [${index + 1}/${PROXIES.length}] ${PROXIES[index].name}${extra ? " — " + extra : ""}`;
}

async function fetchWithProxy(url, startFrom = 0) {
  for (let i = startFrom; i < PROXIES.length; i++) {
    logProxy(i, "try");
    try {
      const r = await fetch(PROXIES[i].fn(url));
      const text = await r.text();

      if (
        text.includes("has been blocked") ||
        text.includes("Access denied") ||
        (text.toLowerCase().includes("error") && text.length < 200)
      ) {
        logProxy(i, "fail", "blocked/error response");
        continue;
      }

      logProxy(i, "ok", `${text.length} bytes`);
      lastWorkingProxy = i;
      return text;
    } catch (e) {
      logProxy(i, "fail", e.message);
    }
  }
  throw new Error("All proxies failed for: " + url);
}

function tryDecode(raw) {
  raw = raw.trim();
  try { return JSON.parse(raw); } catch {}
  try {
    const pad = raw + "=".repeat((4 - raw.length % 4) % 4);
    return JSON.parse(atob(pad.replace(/-/g,'+').replace(/_/g,'/')));
  } catch {}
  throw new Error("Could not decode API response: " + raw.slice(0, 150));
}

async function extract() {
  const tmdb = document.getElementById("tmdb").value.trim();
  const type = document.getElementById("type").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  document.getElementById("proxy-log").innerHTML = "";
  results.innerHTML = "";

  if (!tmdb) { status.textContent = "Enter a TMDB ID."; return; }

  try {
    status.textContent = "Warming up...";
    await fetchWithProxy(`${BASE}/${type}/${tmdb}`, lastWorkingProxy);

    status.textContent = "Calling API...";
    const raw = await fetchWithProxy(`${BASE}/api/${type}/${tmdb}`, lastWorkingProxy);
    console.log("API raw:", raw.slice(0, 200));

    const data = tryDecode(raw);
    console.log("API data:", data);

    if (!data.src) throw new Error("No src in API response: " + JSON.stringify(data));

    const src = data.src;
    const embed = src.startsWith("/") ? BASE + src : src;
    console.log("Embed:", embed);

    status.textContent = "Loading embed...";
    const html = await fetchWithProxy(embed, lastWorkingProxy);
    console.log("Embed snippet:", html.slice(0, 400));

    const url   = html.match(/url\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const token = html.match(/['"]token['"]\s*:\s*['"]([^'"]+)['"]/)?.[1];
    const exp   = html.match(/['"]expires['"]\s*:\s*['"]([^'"]*)['"]/)?.[1];

    console.log({url, token, exp});
    if (!url || !token) throw new Error("Could not parse masterPlaylist");

    const master = `${url}?token=${token}&expires=${exp}&h=1&lang=en`;

    status.textContent = "Fetching M3U8...";
    const m3u8 = await fetchWithProxy(master, lastWorkingProxy);
    console.log("M3U8:", m3u8.slice(0, 300));

    if (!m3u8.includes("#EXTM3U")) throw new Error("Invalid M3U8");

    const lines = m3u8.split("\n");
    let out = `<p><b>Master:</b> <a href="${master}" target="_blank">${master}</a></p>`;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXT-X-STREAM-INF")) {
        const res = lines[i].match(/RESOLUTION=(\d+x\d+)/)?.[1] ?? "unknown";
        const uri = lines[i+1]?.trim();
        if (uri) out += `<div class="stream"><b>${res}</b> — <a href="${uri}" target="_blank">${uri}</a></div>`;
      }
    }
    results.innerHTML = out;
    status.textContent = "Done.";

  } catch(e) {
    status.textContent = "Error: " + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
